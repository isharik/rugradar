# Render.com deployment (free tier, $0). Gives RugRadar a stable public HTTPS URL
# like https://rugradar.onrender.com — that URL is what you register on OKX.AI.
#
# Deploy: push this repo to GitHub → render.com → New → Blueprint → pick the repo.
# Note: free web services sleep after ~15 min idle; keep it warm with a free pinger
# (UptimeRobot / cron-job.org) hitting /health every 10 minutes.
services:
  - type: web
    name: rugradar
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: PAYMENT_MODE
        value: mainnet
      - key: PAYMENTS_ENABLED
        value: "true"
      - key: PAY_TO
        value: "0x60a1527c6de59a6e2c2da4a3e9a1da35b8bf4eca"
      - key: PAY_ASSET_SYMBOL
        value: USDT
      - key: PRICE_PER_CALL
        value: "0.01"
      - key: DEFAULT_CHAIN_ID
        value: "1"
      # OKX Developer Portal credentials (real x402 verify/settle via OKX's
      # facilitator). sync:false = Render prompts you to paste these in the
      # dashboard; they are never committed to the repo.
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET_KEY
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
